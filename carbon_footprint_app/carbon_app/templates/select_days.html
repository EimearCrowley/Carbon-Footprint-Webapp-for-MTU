<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Routing Days</title>
{% load static %}
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  font-family:'Segoe UI',sans-serif;
  background:#f4f7f9;
  margin:0;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.container{
  width:100%;
  max-width:800px;
  background:white;
  padding:40px;
  border-radius:16px;
  box-shadow:0 4px 20px rgba(0,0,0,0.1);
  text-align:center;
}

h1{
  color:#2c3e50;
  margin-bottom:5px;
}

h2{
  color:#27ae60;
  margin-bottom:20px;
}

.form-group{
  margin-bottom:20px;
}

#day-counter{
  font-weight:bold;
  margin-bottom:15px;
}

.day-grid{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:18px;
  margin-top:10px;
}

.day-tile{
  width:90px;
  height:80px;
  background:#ecf0f1;
  border-radius:12px;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  font-weight:bold;
  transition:0.2s;
}

.day-tile span{
  color:#2c3e50;
}

.day-tile input{
  display:none;
}

/* selected */
.day-tile.selected{
  background:#27ae60;
}

.day-tile.selected span{
  color:white;
}

/* permanently disabled */
.day-tile.disabled{
  background:#d5d8dc;
  cursor:not-allowed;
  opacity:0.6;
}

.day-tile.disabled span{
  color:#7f8c8d;
}

/* locked when max reached */
.day-tile.locked{
  background:#d5d8dc;
  cursor:not-allowed;
  opacity:0.6;
}

.day-tile.locked span{
  color:#7f8c8d;
}

/* hover effect */
.day-tile:hover:not(.disabled):not(.locked){
  transform:scale(1.05);
}

.btn{
  width:100%;
  margin-top:25px;
  padding:14px;
  background:#27ae60;
  color:white;
  border:none;
  border-radius:10px;
  font-size:18px;
  cursor:pointer;
  font-weight:bold;
}

.btn:hover{
  background:#219150;
}

.mtu-logo{
  position:fixed;
  bottom:15px;
  right:20px;
  width:120px;
  opacity:0.9;
}

</style>
</head>

<body>

<div class="container">

<h1>Carbon Travel Calculator</h1>
<h2>Select Route Days</h2>

<div class="form-group">
<label>Select the days that this route applies to.</label>

<p id="day-counter">
  0 / {{ remaining_days|default:7 }} days selected
</p>

<form method="post">
{% csrf_token %}

<div class="day-grid">

<label class="day-tile {% if 'mon' in used_days %}disabled{% endif %}">
<input type="checkbox" name="days_selected" value="mon" {% if 'mon' in used_days %}disabled{% endif %}>
<span>Mon</span>
</label>

<label class="day-tile {% if 'tue' in used_days %}disabled{% endif %}">
<input type="checkbox" name="days_selected" value="tue" {% if 'tue' in used_days %}disabled{% endif %}>
<span>Tue</span>
</label>

<label class="day-tile {% if 'wed' in used_days %}disabled{% endif %}">
<input type="checkbox" name="days_selected" value="wed" {% if 'wed' in used_days %}disabled{% endif %}>
<span>Wed</span>
</label>

<label class="day-tile {% if 'thu' in used_days %}disabled{% endif %}">
<input type="checkbox" name="days_selected" value="thu" {% if 'thu' in used_days %}disabled{% endif %}>
<span>Thu</span>
</label>

<label class="day-tile {% if 'fri' in used_days %}disabled{% endif %}">
<input type="checkbox" name="days_selected" value="fri" {% if 'fri' in used_days %}disabled{% endif %}>
<span>Fri</span>
</label>

<label class="day-tile {% if 'sat' in used_days %}disabled{% endif %}">
<input type="checkbox" name="days_selected" value="sat" {% if 'sat' in used_days %}disabled{% endif %}>
<span>Sat</span>
</label>

<label class="day-tile {% if 'sun' in used_days %}disabled{% endif %}">
<input type="checkbox" name="days_selected" value="sun" {% if 'sun' in used_days %}disabled{% endif %}>
<span>Sun</span>
</label>

</div>

<button type="submit" class="btn">Next</button>

</form>
</div>

<script>
const dayTiles = document.querySelectorAll('.day-tile');
const maxDays = {{ remaining_days|default:7 }};
const counter = document.getElementById("day-counter");

function getSelectedCount() {
    return document.querySelectorAll('.day-tile input:checked').length;
}

function updateCounter() {
    const selectedCount = getSelectedCount();
    counter.textContent = selectedCount + " / " + maxDays + " days selected";
}

function updateTileStates() {
    const selectedCount = getSelectedCount();

    dayTiles.forEach(tile => {
        const checkbox = tile.querySelector('input');

        if (tile.classList.contains("disabled")) return;

        if (selectedCount >= maxDays && !checkbox.checked) {
            tile.classList.add("locked");
        } else {
            tile.classList.remove("locked");
        }
    });
}

dayTiles.forEach(tile => {

    if (tile.classList.contains("disabled")) return;

    const checkbox = tile.querySelector('input');

    tile.addEventListener('click', (e) => {
        e.preventDefault();

        if (tile.classList.contains("locked")) return;

        checkbox.checked = !checkbox.checked;
        tile.classList.toggle('selected');

        updateCounter();
        updateTileStates();
    });

});

updateCounter();
updateTileStates();
</script>
<img src="{% static 'carbon_app/images/mtu_logo.png' %}" class="mtu-logo">
</body>
</html>
