<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Routing Days</title>
{% load static %}
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  font-family:'Segoe UI',sans-serif;
  background:#f4f7f9;
  margin:0;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.container{
  width:100%;
  max-width:800px;
  background:white;
  padding:40px;
  border-radius:16px;
  box-shadow:0 4px 20px rgba(0,0,0,0.1);
  text-align:center;
}

h1{
  color:#2c3e50;
  margin-bottom:5px;
}

h2{
  color:#27ae60;
  margin-bottom:20px;
}

.form-group{
  margin-bottom:20px;
}

#day-counter{
  font-weight:bold;
  margin-bottom:15px;
}

.day-grid{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:18px;
  margin-top:10px;
}

.day-tile{
  width:90px;
  height:80px;
  background:#ecf0f1;
  border-radius:12px;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  font-weight:bold;
  transition:0.2s;
}

.day-tile span{
  color:#2c3e50;
}

.day-tile input{
  display:none;
}

/* selected */
.day-tile.selected{
  background:#27ae60;
}

.day-tile.selected span{
  color:white;
}

/* permanently disabled */
.day-tile.disabled{
  background:#d5d8dc;
  cursor:not-allowed;
  opacity:0.6;
}

.day-tile.disabled span{
  color:#7f8c8d;
}

/* locked when max reached */
.day-tile.locked{
  background:#d5d8dc;
  cursor:not-allowed;
  opacity:0.6;
}

.day-tile.locked span{
  color:#7f8c8d;
}

/* hover effect */
.day-tile:hover:not(.disabled):not(.locked){
  transform:scale(1.05);
}

.btn{
  width:100%;
  margin-top:25px;
  padding:14px;
  background:#27ae60;
  color:white;
  border:none;
  border-radius:10px;
  font-size:18px;
  cursor:pointer;
  font-weight:bold;
}

.btn:hover{
  background:#219150;
}

.mtu-logo{
  position:fixed;
  bottom:15px;
  left:20px;
  width:120px;
  opacity:0.9;
}

.app-logo{
    position:fixed;
    top:15px;
    left:20px;
    width:120px;
    z-index:1000;
}

</style>
</head>

<body>
    <a href="{% url 'reset_start' %}">
    <img src="{% static 'carbon_app/images/app_logo.png' %}" class="app-logo">
</a>

<div class="container">

<h1>Carbon Travel Calculator</h1>
<h2>Select Route Days</h2>

<div class="form-group">
<label>Select the days that this route applies to.</label>

<p id="day-counter">
{{ selected_total }} / {{ total_days }} days selected
</p>

<form method="post">
{% csrf_token %}

<div class="day-grid">

{% for day, label in day_names.items %}

<div class="day-tile {% if day in used_days %}disabled{% endif %}
{% if day in current_days %}selected{% endif %}"
     data-day="{{ day }}">
    {{ label }}
</div>

{% endfor %}

</div>

<!-- HIDDEN INPUT -->
<div id="hidden-days"></div>

<button type="submit" class="btn">Continue</button>

</form>

</div>

<script>
let maxDays = {{ total_days|default:7 }};
let selectedDays = {{ current_days|default:"[]"|safe }};
let selectedTotal = {{ selected_total|default:0 }} + selectedDays.length;

const counter = document.getElementById("day-counter");
const tiles = document.querySelectorAll(".day-tile");

// ✅ update counter + locking logic
function updateUI() {
    counter.innerText = selectedTotal + " / " + maxDays + " days selected";

    tiles.forEach(tile => {

        // skip permanently disabled (other journeys)
        if (tile.classList.contains("disabled")) return;

        // LOCK remaining tiles when max reached
        if (!tile.classList.contains("selected") && selectedTotal >= maxDays) {
            tile.classList.add("locked");
        } else {
            tile.classList.remove("locked");
        }

    });
}

// ✅ hidden inputs
function updateHiddenInputs() {
    const container = document.getElementById("hidden-days");
    container.innerHTML = "";

    selectedDays.forEach(day => {
        let input = document.createElement("input");
        input.type = "hidden";
        input.name = "days_selected";
        input.value = day;
        container.appendChild(input);
    });
}

// ✅ initialise tiles
tiles.forEach(tile => {

    const day = tile.dataset.day;

    // mark tiles used by OTHER journeys
    if (tile.classList.contains("disabled")) {
        tile.classList.add("used");
    }

    tile.addEventListener("click", function(){

        // 🚫 block other journeys
        if (tile.classList.contains("used")) return;

        // 🚫 block when locked
        if (tile.classList.contains("locked")) return;

        if (tile.classList.contains("selected")) {
            tile.classList.remove("selected");
            selectedDays = selectedDays.filter(d => d !== day);
            selectedTotal--;
        } else {
            tile.classList.add("selected");
            selectedDays.push(day);
            selectedTotal++;
        }

        updateHiddenInputs();
        updateUI();
    });

});

// initial render
updateHiddenInputs();
updateUI();
</script>
<img src="{% static 'carbon_app/images/mtu_logo.png' %}" class="mtu-logo">
</body>
</html>
