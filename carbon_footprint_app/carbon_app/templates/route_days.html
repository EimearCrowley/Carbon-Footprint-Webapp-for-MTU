
<h1 style="color: red;">SCREEN 3: Route & Days</h1>

<!DOCTYPE html>
<html>
<head>
  <title>Travel Details</title>
  {% load static %}
  <link rel="stylesheet" href="{% static 'carbon_app/style.css' %}">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">
  <h2>Travel Details</h2>
  <form method="post">
    {% csrf_token %}
    <div class="mb-3">
      {{ form.start_location.label_tag }}
      {{ form.start_location }}
    </div>
    <div class="mb-3">
      {{ form.destination.label_tag }}
      {{ form.destination }}
    </div>
    <div class="mb-3">
      {{ form.travel_days.label_tag }}
      {{ form.travel_days }}
    </div>
    <button type="submit" class="btn btn-success">Next</button>
  </form>
</body>
</html>
