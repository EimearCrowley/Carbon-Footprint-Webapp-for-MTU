<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Carbon Travel Calculator</title>
{% load static %}
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  font-family:'Segoe UI',sans-serif;
  background:#f4f7f9;
  margin:0;
  padding:0;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.container{
  width:100%;
  max-width:800px;
  background:white;
  padding:40px;
  border-radius:16px;
  box-shadow:0 4px 20px rgba(0,0,0,0.1);
}

h1,h2{
  text-align:center;
}

h1{color:#2c3e50;}
h2{color:#27ae60;}

.form-group{
  margin-bottom:25px;
}

label{
  font-weight:600;
  color:#2c3e50;
  display:block;
  margin-bottom:8px;
}

input[type="text"],
input[type="number"]{
  width:100%;
  padding:12px;
  border:1px solid #ccc;
  border-radius:8px;
  font-size:16px;
}

.mode-grid{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:20px;
}

.mode-option{
  width:120px;
  height:110px;
  border-radius:12px;
  background:#ecf0f1;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  border:3px solid transparent;
}

.mode-option.selected{
  background:#27ae60;
  border-color:#27ae60;
}

.mode-option span{
  font-size:14px;
  color:#2c3e50;
}

.mode-option.selected span{
  color:white;
  font-weight:bold;
}

.btn{
  width:100%;
  padding:14px;
  background:#27ae60;
  color:white;
  border:none;
  border-radius:10px;
  font-size:18px;
  cursor:pointer;
  font-weight:bold;
}

.btn:hover{
  background:#219150;
}

#secondary-section{
  display:none;
}
</style>
</head>

<body>

<div class="container">

<h1>Carbon Travel Calculator</h1>
<h2>Enter Your Journey Details</h2>

<form method="post">
{% csrf_token %}

<div class="form-group">
<label>Start Location</label>
{{ form.origin }}
</div>


<!-- SECOND LEG LOCATION (only if duo transport) -->
<div id="secondary-section">

<div class="form-group">
<label>Interchange Location</label>
{{ form.secondary_origin }}
</div>

</div>


<!-- FINAL DESTINATION -->
<div class="form-group">
<label>Select Final Destination (Car Park)</label>

<div class="mode-grid" id="carpark-options">

{% for value,label in form.destination.field.choices %}

<label class="mode-option">

<input type="radio" name="destination" value="{{value}}" style="display:none;">

<div class="icon">

{% if value == 'bishopstown' %}🅿️
{% elif value == 'sports_hall' %}🏋️‍♂️
{% elif value == 'student_centre' %}🎓
{% elif value == 'park_ride' %}🚌
{% elif value == 'st_finbarrs' %}🏛️
{% elif value == 'carrolls_quay' %}🌉
{% endif %}

</div>

<span>{{label}}</span>

</label>

{% endfor %}

</div>
</div>


<div class="form-group">
<label>Days per week</label>
{{ form.days_per_week }}
</div>


<button type="submit" class="btn">Next</button>

</form>
</div>


<script>

const carparkOptions=document.querySelectorAll('#carpark-options .mode-option');

carparkOptions.forEach(option=>{
option.addEventListener('click',()=>{
carparkOptions.forEach(opt=>opt.classList.remove('selected'));
option.classList.add('selected');
option.querySelector('input').checked=true;
});
});


/* show secondary location if duo transport */
const duoMode = "{{ duo_mode|yesno:'true,false' }}";

if(duoMode === "true"){
document.getElementById("secondary-section").style.display="block";
}

</script>

</body>
</html>
