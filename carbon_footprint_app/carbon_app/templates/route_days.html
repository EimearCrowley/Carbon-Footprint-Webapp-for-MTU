<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Carbon Travel Calculator</title>
  {% load static %}
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background-color: #f4f7f9;
      margin: 0;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    .container {
      width: 100%;
      max-width: 800px;
      background: white;
      padding: 40px;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
    }

    h1 {
      text-align: center;
      color: #2c3e50;
      margin-bottom: 10px;
    }

    h2 {
      text-align: center;
      color: #27ae60;
      margin-bottom: 30px;
    }

    .form-group {
      margin-bottom: 25px;
    }

    label {
      font-weight: 600;
      color: #2c3e50;
      display: block;
      margin-bottom: 8px;
    }

    input[type="text"],
    input[type="number"] {
      width: 100%;
      padding: 12px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 16px;
      box-sizing: border-box;
    }

    .input-row {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
    }

    .input-row .form-group {
      flex: 1 1 45%;
    }

    .btn {
      width: 100%;
      padding: 14px;
      background-color: #27ae60;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 18px;
      cursor: pointer;
      font-weight: bold;
    }

    .btn:hover {
      background-color: #219150;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Carbon Travel Calculator</h1>
    <h2>Enter Your Journey Details</h2>

    <form method="post">
      {% csrf_token %}

      <div class="input-row">
        <div class="form-group">
          <label for="origin">Start Location</label>
          {{ form.origin }}
        </div>

        <div class="form-group">
          <label for="destination">Destination</label>
          {{ form.destination }}
        </div>
      </div>

      <div class="form-group">
        <label for="days_per_week">How many days per week do you travel this route?</label>
        {{ form.days_per_week }}
      </div>

      <button type="submit" class="btn">Next</button>
    </form>
  </div>
</body>
</html>
