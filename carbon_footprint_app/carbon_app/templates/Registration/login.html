<!DOCTYPE html>
<html>
<head>
{% load static %}
    <title>Login</title>

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #f4f7f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 16px;
            width: 400px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            text-align: center;
        }

        h1 {
            color: #27ae60;
            margin-bottom: 25px;
        }

        form input {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        button {
            margin-top: 20px;
            width: 100%;
            padding: 14px;
            background-color: #27ae60;
            border: none;
            color: white;
            font-size: 16px;
            border-radius: 10px;
            cursor: pointer;
        }

        button:hover {
            background-color: #219150;
        }

        a {
            display: block;
            margin-top: 15px;
            color: #27ae60;
        }
        .mtu-logo{
        position:fixed;
        bottom:15px;
        left:20px;
        width:120px;
        opacity:0.9;
        }
        .app-logo{
        position:fixed;
        top:15px;
        left:20px;
        width:120px;
        z-index:1000;
        }

        .errorlist {
        color: red;
        list-style: none;
        padding: 0;
        margin: 5px 0;
        }

        .errorlist li {
        margin: 3px 0;
        }
        
    </style>

</head>

<body>
    <a href="{% url 'reset_start' %}">
    <img src="{% static 'carbon_app/images/app_logo.png' %}" class="app-logo">
</a>

<div class="container">

    <h1>Login</h1>

    <form method="post" action="{% url 'login' %}">
    {% csrf_token %}
    {{ form.as_p }}

    <button type="submit">Login</button>
</form>

    <a href="/accounts/signup/">Create an account</a>

</div>
<img src="{% static 'carbon_app/images/mtu_logo.png' %}" class="mtu-logo">
</body>
</html>
