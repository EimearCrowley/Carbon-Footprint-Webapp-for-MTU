<!DOCTYPE html>
<html>
<head>
{% load static %}
    <title>Sign Up</title>

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #f4f7f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 16px;
            width: 400px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            text-align: center;
        }

        h1 {
            color: #27ae60;
            margin-bottom: 25px;
        }

        form input {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        button {
            margin-top: 20px;
            width: 100%;
            padding: 14px;
            background-color: #27ae60;
            border: none;
            color: white;
            font-size: 16px;
            border-radius: 10px;
            cursor: pointer;
        }

        button:hover {
            background-color: #219150;
        }

        a {
            display: block;
            margin-top: 15px;
            color: #27ae60;
        }
         .mtu-logo{
        position:fixed;
        bottom:15px;
        right:20px;
        width:120px;
        opacity:0.9;
        }
    </style>

</head>

<body>

<div class="container">

    <h1>Create Account</h1>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}

        <button type="submit">Sign Up</button>
    </form>

    <a href="/accounts/login/">Already have an account? Login</a>

</div>
<img src="{% static 'carbon_app/images/mtu_logo.png' %}" class="mtu-logo">
</body>
</html>
