<!DOCTYPE html>
<html>
<head>
{% load static %}
    <title>Dashboard</title>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    background-color: #f4f7f9;
    margin: 0;
    padding: 0;
}

.container {
    width: 100%;
    max-width: 800px;
    margin: 80px auto;
    background: white;
    padding: 40px;
    border-radius: 16px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    text-align: center;
}

h1{
    color:#2c3e50;
}

.btn{
    display:block;
    margin-top:20px;
    padding:14px;
    background:#27ae60;
    color:white;
    text-decoration:none;
    border-radius:10px;
    font-weight:bold;
}

.btn:hover{
    background:#219150;
}

.topbar{
    position:absolute;
    top:20px;
    right:30px;
}
 .mtu-logo{
        position:fixed;
        bottom:15px;
        right:20px;
        width:120px;
        opacity:0.9;
        }
</style>

</head>

<body>

<div class="topbar">
<span>Welcome {{ user.username }}</span>

<form action="{% url 'logout' %}" method="post" style="display:inline;">
    {% csrf_token %}
    <button type="submit" style="margin-left:15px;">Logout</button>
</form>

</div>

<div class="container">

<h1>Hello {{ user.username }} 👋</h1>

<p>Welcome to your Carbon Dashboard!</p>

<a href="{% url 'reset_calculator' %}" class="btn">Start New Calculation</a>

<a href="{% url 'previous_results' %}" class="btn">View Previous Results</a>

</div>
<img src="{% static 'carbon_app/images/mtu_logo.png' %}" class="mtu-logo">
</body>
</html>
