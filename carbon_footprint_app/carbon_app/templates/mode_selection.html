<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Carbon Travel Calculator</title>
  {% load static %}
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background-color: #f4f7f9;
      margin: 0;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    .container {
      width: 100%;
      max-width: 800px;
      background: white;
      padding: 40px;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
      text-align: center;
    }

    h1 {
      color: #2c3e50;
      margin-bottom: 10px;
    }

    h2 {
      color: #27ae60;
      margin-bottom: 30px;
    }

    .mode-grid {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
      margin-bottom: 30px;
    }

    .mode-option {
      width: 110px;
      height: 110px;
      border-radius: 12px;
      background-color: #ecf0f1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background-color 0.3s ease;
      border: 3px solid transparent;
    }

    .mode-option.selected {
      background-color: #27ae60;
      border-color: #27ae60;
    }

    .mode-option img {
      width: 48px;
      height: 48px;
      margin-bottom: 8px;
    }

    .mode-option span {
      font-size: 14px;
      color: #2c3e50;
    }

    .mode-option.selected span {
      color: white;
      font-weight: bold;
    }

    .btn {
      width: 100%;
      padding: 14px;
      background-color: #27ae60;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 18px;
      cursor: pointer;
      font-weight: bold;
    }

    .btn:hover {
      background-color: #219150;
    }

    .form-group {
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Carbon Travel Calculator</h1>
    <h2>How are you travelling today?</h2>

    <form method="post">
      {% csrf_token %}
      <div class="mode-grid" id="mode-options">
        <label class="mode-option">
          <input type="radio" name="mode_1" value="train" style="display: none;">
          <img src="{% static 'carbon_app/images/train_button.png' %}" alt = "Train">
          <span>Train</span>
        </label>
        <label class="mode-option">
          <input type="radio" name="mode_1" value="bus" style="display: none;">
          <img src="{% static 'carbon_app/images/bus_button.png' %}" alt = "Bus">
          <span>Bus</span>
        </label>
        <label class="mode-option">
          <input type="radio" name="mode_1" value="car" style="display: none;">
          <img src="{% static 'carbon_app/images/car_button.png' %}" alt = "Car">
          <span>Car</span>
        </label>
        <label class="mode-option">
          <input type="radio" name="mode_1" value="cycling" style="display: none;">
          <img src="{% static 'carbon_app/images/cycling_button.png' %}" alt = "Bike">
          <span>Bike</span>
        </label>
        <label class="mode-option">
          <input type="radio" name="mode_1" value="scooter" style="display: none;">
          <img src="{% static 'carbon_app/images/electric_scooter_bike.png' %}" alt = "E-Scooter/Bike">
          <span>Scooter</span>
        </label>
        <label class="mode-option">
          <input type="radio" name="mode_1" value="walk" style="display: none;">
          <img src="{% static 'carbon_app/images/walking_button.png' %}" alt="Walking">
          <span>Walk</span>
        </label>
      </div>

      <div class="form-group">
        <label for="duo_mode">Do you use a second mode of transport?</label>
        {{ form.duo_mode }}
      </div>

      <div class="form-group" id="mode-2-group" style="display: none;">
        <label for="mode_2">Select second mode:</label>
        {{ form.mode_2 }}
      </div>

      <button type="submit" class="btn">Next</button>
    </form>
  </div>

  <script>
    const modeOptions = document.querySelectorAll('.mode-option');
    const duoCheckbox = document.querySelector('input[name="duo_mode"]');
    const mode2Group = document.getElementById('mode-2-group');

    modeOptions.forEach(option => {
      option.addEventListener('click', () => {
        modeOptions.forEach(opt => opt.classList.remove('selected'));
        option.classList.add('selected');
        option.querySelector('input').checked = true;
      });
    });

    if (duoCheckbox) {
      duoCheckbox.addEventListener('change', () => {
        mode2Group.style.display = duoCheckbox.checked ? 'block' : 'none';
      });
    }

    window.onload = () => {
      const selected = document.querySelector('input[name="mode_1"]:checked');
      if (selected) {
        selected.closest('.mode-option')?.classList.add('selected');
      }
      if (duoCheckbox && duoCheckbox.checked) {
        mode2Group.style.display = 'block';
      }
    };
  </script>
</body>
</html>
