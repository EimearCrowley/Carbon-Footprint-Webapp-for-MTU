<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Carbon Travel Calculator</title>
  {% load static %}
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background-color: #f4f7f9;
      margin: 0;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    .container {
      width: 100%;
      max-width: 800px;
      background: white;
      padding: 40px;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
      text-align: center;
    }

    h1 {
      color: #2c3e50;
      margin-bottom: 10px;
    }

    h2 {
      color: #27ae60;
      margin-bottom: 30px;
    }

    .mode-grid {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
      margin-bottom: 30px;
    }

    .mode-option {
      width: 110px;
      height: 110px;
      border-radius: 12px;
      background-color: #ecf0f1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background-color 0.3s ease;
      border: 3px solid transparent;
    }

    .mode-option.selected {
      background-color: #27ae60;
      border-color: #27ae60;
    }

    .mode-option img {
      width: 48px;
      height: 48px;
      margin-bottom: 8px;
    }

    .mode-option span {
      font-size: 14px;
      color: #2c3e50;
    }

    .mode-option.selected span {
      color: white;
      font-weight: bold;
    }

    .btn {
      width: 100%;
      padding: 14px;
      background-color: #27ae60;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 18px;
      cursor: pointer;
      font-weight: bold;
    }

    .btn:hover {
      background-color: #219150;
    }

    .form-group {
      margin-top: 20px;
      text-align: left;
    }

    #secondary-fields {
      display: none;
      margin-top: 30px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Carbon Travel Calculator</h1>
    <h2>How are you travelling today?</h2>

    <form method="post">
      {% csrf_token %}

      <div class="form-group">
        <label>Primary Mode of Transport</label>
        <div class="mode-grid" id="mode-options-1">
          {% for value, label in form.mode_1.field.choices %}
            <label class="mode-option">
              <input type="radio" name="mode_1" value="{{ value }}" style="display: none;">
              <img src="{% static 'carbon_app/images/'|add:value|add:'_button.png' %}" alt="{{ label }}">
              <span>{{ label }}</span>
            </label>
          {% endfor %}
        </div>
      </div>

      <div class="form-group">
        {{ form.duo_mode }} {{ form.duo_mode.label_tag }}
      </div>

      <div id="secondary-fields">
        <div class="form-group">
          <label>Secondary Mode of Transport</label>
          <div class="mode-grid" id="mode-options-2">
            {% for value, label in form.mode_2.field.choices %}
              <label class="mode-option">
                <input type="radio" name="mode_2" value="{{ value }}" style="display: none;">
                <img src="{% static 'carbon_app/images/'|add:value|add:'_button.png' %}" alt="{{ label }}">
                <span>{{ label }}</span>
              </label>
            {% endfor %}
          </div>
        </div>
      </div>

      <button type="submit" class="btn">Next</button>
    </form>
  </div>

  <script>
    function setupModeSelector(containerId, inputName) {
      const options = document.querySelectorAll(`#${containerId} .mode-option`);
      options.forEach(option => {
        option.addEventListener('click', () => {
          options.forEach(opt => opt.classList.remove('selected'));
          option.classList.add('selected');
          option.querySelector(`input[name="${inputName}"]`).checked = true;
        });
      });
    }

    setupModeSelector('mode-options-1', 'mode_1');
    setupModeSelector('mode-options-2', 'mode_2');

    const duoCheckbox = document.querySelector('input[name="duo_mode"]');
    const secondaryFields = document.getElementById('secondary-fields');

    function toggleSecondaryFields() {
      secondaryFields.style.display = duoCheckbox.checked ? 'block' : 'none';
    }

    duoCheckbox.addEventListener('change', toggleSecondaryFields);
    window.onload = toggleSecondaryFields;
  </script>
</body>
</html>
