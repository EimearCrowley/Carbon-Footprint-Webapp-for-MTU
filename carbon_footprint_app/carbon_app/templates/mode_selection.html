{% load static %}
<!DOCTYPE html>
<html>
<head>
  <title>Carbon Travel Calculator</title>
  <link rel="stylesheet" href="{% static 'carbon_app/style.css' %}">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
      background-color: #e8f5e9;
      font-family: 'Segoe UI', sans-serif;
    }

    .full-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .navbar {
      background-color: #ffffff;
      border-bottom: 1px solid #ddd;
      padding: 0.75rem 2rem;
    }

    .navbar-brand {
      font-weight: bold;
      color: #2e7d32;
      font-size: 1.5rem;
    }

    .nav-link {
      color: #2e7d32;
      font-weight: 500;
    }

    .hero {
      text-align: center;
      padding: 3rem 1rem 2rem;
    }

    .hero h1 {
      font-size: 2.5rem;
      color: #2e7d32;
      margin-bottom: 0.5rem;
    }

    .hero p {
      font-size: 1.2rem;
      color: #555;
    }

    .mode-grid {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 2rem;
      padding: 2rem 1rem;
    }

    .mode-button {
      width: 100px;
      height: 100px;
      object-fit: contain;
      cursor: pointer;
      border: 2px solid transparent;
      border-radius: 8px;
      transition: border 0.2s;
    }

    .mode-button.selected {
      border-color: #2e7d32;
    }

    .mode-label {
      text-align: center;
      font-weight: 500;
      margin-top: 0.5rem;
    }

    .next-button {
      display: flex;
      justify-content: center;
      margin-bottom: 2rem;
    }
  </style>
</head>
<body>
  <div class="full-page">
    <nav class="navbar">
      <div class="navbar-brand">Carbon Travel Calculator</div>
      <div class="ms-auto">
        <a class="nav-link d-inline me-3" href="#">About</a>
        <a class="nav-link d-inline" href="#">How it works</a>
      </div>
    </nav>

    <div class="hero">
      <h1>How are you travelling today?</h1>
      <p>Select your transport mode to calculate your carbon footprint</p>
    </div>

    <form method="post" class="flex-grow-1 d-flex flex-column justify-content-between">
      {% csrf_token %}
      <div class="mode-grid">
        <div class="text-center">
          <input type="radio" name="mode_1" value="train" id="mode_train" class="d-none" required>
          <label for="mode_train">
            <img src="{% static 'carbon_app/images/train_button.png' %}" alt="Train" class="mode-button" onclick="selectMode(this)">
            <div class="mode-label">Train</div>
          </label>
        </div>
        <div class="text-center">
          <input type="radio" name="mode_1" value="bus" id="mode_bus" class="d-none">
          <label for="mode_bus">
            <img src="{% static 'carbon_app/images/bus_button.png' %}" alt="Bus" class="mode-button" onclick="selectMode(this)">
            <div class="mode-label">Bus</div>
          </label>
        </div>
        <div class="text-center">
          <input type="radio" name="mode_1" value="car" id="mode_car" class="d-none">
          <label for="mode_car">
            <img src="{% static 'carbon_app/images/car_button.png' %}" alt="Car" class="mode-button" onclick="selectMode(this)">
            <div class="mode-label">Car</div>
          </label>
        </div>
        <div class="text-center">
          <input type="radio" name="mode_1" value="bike" id="mode_bike" class="d-none">
          <label for="mode_bike">
            <img src="{% static 'carbon_app/images/cycling_button.png' %}" alt="Bike" class="mode-button" onclick="selectMode(this)">
            <div class="mode-label">Bike</div>
          </label>
        </div>
        <div class="text-center">
          <input type="radio" name="mode_1" value="scooter" id="mode_scooter" class="d-none">
          <label for="mode_scooter">
            <img src="{% static 'carbon_app/images/electic_skooter_bike.png' %}" alt="E-Scooter/Bike" class="mode-button" onclick="selectMode(this)">
            <div class="mode-label">Scooter</div>
          </label>
        </div>
        <div class="text-center">
          <input type="radio" name="mode_1" value="walk" id="mode_walk" class="d-none">
          <label for="mode_walk">
            <img src="{% static 'carbon_app/images/walking_button.png' %}" alt="Walk" class="mode-button" onclick="selectMode(this)">
            <div class="mode-label">Walk</div>
          </label>
        </div>
      </div>

      <div class="next-button">
        <button type="submit" class="btn btn-success px-4">Next</button>
      </div>
    </form>
  </div>

  <script>
    function selectMode(img) {
      document.querySelectorAll('.mode-button').forEach(el => el.classList.remove('selected'));
      img.classList.add('selected');
    }
  </script>
</body>
