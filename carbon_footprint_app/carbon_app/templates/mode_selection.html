{% load static %}
<!DOCTYPE html>
<html>
<head>
  <title>Mode Selection</title>
  <link rel="stylesheet" href="{% static 'carbon_app/style.css' %}">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    .mode-button {
      width: 100px;
      height: 100px;
      object-fit: contain;
      cursor: pointer;
      border: 2px solid transparent;
      border-radius: 8px;
      transition: border 0.2s;
    }
    .mode-button.selected {
      border-color: #007bff;
    }
    .mode-label {
      text-align: center;
      font-weight: 500;
      margin-top: 5px;
    }
  </style>
</head>
<body class="container mt-5">
  <h2>Select Your Mode of Transport</h2>
  <form method="post">
    {% csrf_token %}

    <h4>Primary Mode</h4>
    <div class="d-flex flex-wrap gap-4">
      <div class="text-center">
        <input type="radio" name="mode_1" value="car" id="mode_car" class="d-none" required>
        <label for="mode_car">
          <img src="{% static 'carbon_app/images/car_button.png' %}" alt="Car" class="mode-button" onclick="selectMode(this)">
          <div class="mode-label">Car</div>
        </label>
      </div>
      <div class="text-center">
        <input type="radio" name="mode_1" value="bus" id="mode_bus" class="d-none">
        <label for="mode_bus">
          <img src="{% static 'carbon_app/images/bus_button.png' %}" alt="Bus" class="mode-button" onclick="selectMode(this)">
          <div class="mode-label">Bus</div>
        </label>
      </div>
      <div class="text-center">
        <input type="radio" name="mode_1" value="bike" id="mode_bike" class="d-none">
        <label for="mode_bike">
          <img src="{% static 'carbon_app/images/cycling_button.png' %}" alt="Bike" class="mode-button" onclick="selectMode(this)">
          <div class="mode-label">Bike</div>
        </label>
      </div>
      <div class="text-center">
        <input type="radio" name="mode_1" value="walk" id="mode_walk" class="d-none">
        <label for="mode_walk">
          <img src="{% static 'carbon_app/images/walking_button.png' %}" alt="Walk" class="mode-button" onclick="selectMode(this)">
          <div class="mode-label">Walk</div>
        </label>
      </div>
      <div class="text-center">
        <input type="radio" name="mode_1" value="train" id="mode_train" class="d-none">
        <label for="mode_train">
          <img src="{% static 'carbon_app/images/train_button.png' %}" alt="Train" class="mode-button" onclick="selectMode(this)">
          <div class="mode-label">Train</div>
        </label>
      </div>
    </div>

    <div class="form-check form-switch mt-4">
      {{ form.duo_mode }}
      <label class="form-check-label" for="{{ form.duo_mode.id_for_label }}">
        {{ form.duo_mode.label }}
      </label>
    </div>

    <div id="secondary-mode" class="mt-3" style="display: none;">
      <h4>Secondary Mode</h4>
      {{ form.mode_2 }}
    </div>

    <button type="submit" class="btn btn-primary mt-4">Next</button>
  </form>

  <script>
    function selectMode(img) {
      document.querySelectorAll('.mode-button').forEach(el => el.classList.remove('selected'));
      img.classList.add('selected');
    }

    document.addEventListener('DOMContentLoaded', function () {
      const duoToggle = document.querySelector('input[name="duo_mode"]');
      const secondary = document.getElementById('secondary-mode');
      if (duoToggle) {
        duoToggle.addEventListener('change', function () {
          secondary.style.display = this.checked ? 'block' : 'none';
        });
        secondary.style.display = duoToggle.checked ? 'block' : 'none';
      }
    });
  </script>
</body>
</html>
